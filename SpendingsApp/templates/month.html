{% extends 'base.html' %}

{% block content %}

<div class="container">

<h2>Monthly Overview</h2>

<br>

<form id="month-form" action="{% url 'monthly_overview' %}" method="post">
    {% csrf_token %}
    <div class="form-group">
        <div class="row">
            <div class="col">
                {{ monthForm.month }}
            </div>
            <div class="col">
                {{ monthForm.year }}
            </div>
            <div class="col">
                <button type="submit" name="request-month-overview" class="btn btn-outline-secondary form-control">
                    <i class="bi bi-search"></i>
                </button>
            </div>
        </div>
    </div>
</form>

<br>
    <table id="month-spendings-table" class="table table-striped">
        <thead>
            <tr>
                <th style="width: 9%;" scope="col" class="col-xs-1">Date</th>
                <th style="width: 23%;">Category</th>
                <th style="width: 49%;">Description</th>
                <th style="width: 13%;" class="text-end">Amount</th>
                <th style="width: 3%;" class="text-end"></th>
                <th style="width: 3%;" class="text-end"></th>
            </tr>
        </thead>
        <tbody id="month-spendings-tbody" class="table-group-divider"></tbody>
    </table>
</div>

{% endblock %}

{% block extra_scripts %}
{% load static %}
<script src="{% static 'js/update-month.js' %}"></script>
{% endblock %}
