{% extends 'base.html' %}

{% block content %}

<div class="container">

    <h2>Edit Category</h2>
    <br>

    <form action="" method="post">
        {% csrf_token %}
        <div class="row mb-3">
            <div class="col">
                {{ categoryForm.name }}
            </div>
        </div>
        <div class="row mb-3">
            <div class="col">
                <button type="submit" class="form-control btn btn-outline-secondary w-100" name="edit-category" value="Rename">
                    <i class="bi bi-save"></i>
                </button>
            </div>
            <div class="col">
                <button type="submit" class="form-control btn btn-outline-danger" name="delete-category" value="Delete">
                    <i class="bi bi-trash"></i>
                </button>
            </div>
        </div>
    </form>
</div>

{% endblock %}
