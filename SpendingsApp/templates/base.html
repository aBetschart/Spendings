<!DOCTYPE html>
<HTML lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Application to get an overview over your spendings">
    <meta name="keywords" content="finance spendings">
    
    <!-- Bootstrap CSS -->
    {% load static %}
    <link rel="stylesheet" href="{% static '/css/main.min.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.5/jquery.validate.min.js"></script>
    <script src=" https://cdn.jsdelivr.net/npm/date-fns@4.1.0/cdn.min.js "></script>
    
    <script>
      const DJANGO_URLS = {
          spending_submit_api: "{% url 'spending_submit_api' %}",
          spending_get_recent: "{% url 'spending_get_recent' %}",
          spending_get: "{% url 'spending_get' %}",
          spending_edit_api: "{% if spending %}{% url 'spending_edit_api' spending.id %}{% endif %}"
      };
    </script>

    <script src="{% static 'js/dateFormat.js'%}"></script>
    <script src="{% static 'js/jquery-dateformat.js' %}"></script>
    <script src="{% static 'js/today.js'%}"></script>
  
    <title>Spendings</title>

    {% block extra_head %}{% endblock %}

  </head> 
  <body>

    {% include 'navbar.html' %}

    <br>

    <div class="container-fluid">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    {% block extra_scripts %}{% endblock %}

  </body>
</html>
